<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cleaning Calendar</title>

  <link rel="apple-touch-icon" sizes="180x180" href="./icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192-android.png">
  <link rel="icon" type="image/png" sizes="512x512" href="./icon-512-android.png">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0f1117">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Cleaning Calendar">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    :root {
      --bg: #0f1117;
      --panel: #171a22;
      --panel2: #20242f;
      --text: #f3f4f6;
      --muted: #9ca3af;
      --border: #2d3340;
      --accent: #6aa6ff;
      --cellw: 94px;
      --leftw: 176px;
      --headh: 48px;
      --rowh: 70px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    button, input, select, textarea {
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 10px 12px;
      background: var(--panel2);
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
    }

    button:active { transform: scale(0.98); }

    .app {
      height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      z-index: 30;
      padding: 10px 10px 8px;
      border-bottom: 1px solid var(--border);
      background: rgba(15, 17, 23, 0.96);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .month-row {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .month-title {
      text-align: center;
      font-weight: 850;
      font-size: 18px;
    }

    .top-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .top-actions button {
      padding: 9px 4px;
      font-size: 12px;
      white-space: nowrap;
    }

    .calendar-scroll {
      height: 100%;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      position: relative;
      cursor: default;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      touch-action: auto;
      overscroll-behavior: contain;
    }

    .calendar-scroll.dragging {
      cursor: grabbing;
    }

    .calendar-scroll * {
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: var(--leftw) repeat(var(--days), var(--cellw));
      grid-template-rows: var(--headh) repeat(var(--rows), var(--rowh));
      width: max-content;
      min-width: 100%;
    }

    .corner,
    .date-head,
    .left-cell,
    .cal-cell {
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .corner {
      position: sticky;
      left: 0;
      top: 0;
      z-index: 25;
      touch-action: pan-y;
      background: rgba(17, 20, 29, 0.98);
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .corner-add {
      width: 30px;
      height: 30px;
      min-width: 30px;
      padding: 0;
      border-radius: 999px;
      background: rgba(106,166,255,.18);
      border: 1px solid rgba(106,166,255,.38);
      color: var(--text);
      font-size: 19px;
      line-height: 1;
      display: grid;
      place-items: center;
    }

    .date-head {
      position: sticky;
      top: 0;
      z-index: 20;
      touch-action: pan-x;
      background: rgba(17, 20, 29, 0.98);
      display: grid;
      place-items: center;
      padding: 4px;
      min-width: var(--cellw);
    }

    .date-head.today {
      background: rgba(106, 166, 255, 0.16);
    }

    .date-num {
      font-size: 15px;
      font-weight: 900;
      line-height: 1.1;
    }

    .date-week {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.1;
      margin-top: 4px;
      text-align: center;
    }

    .date-head.sun .date-week { color: #ff9aa2; }
    .date-head.sat .date-week { color: #8bbcff; }

    .left-cell {
      touch-action: manipulation;
      position: sticky;
      left: 0;
      z-index: 15;
      touch-action: pan-y;
      cursor: pointer;
      background: rgba(17, 20, 29, 0.98);
      padding: 5px 8px 5px 10px;
      overflow: hidden;
      display: grid;
      align-content: center;
      gap: 3px;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.15s;
    }

    .left-cell:not(.activity):hover {
      background: rgba(32, 36, 52, 0.98);
    }

    .left-cell.activity {
      background: rgba(32, 36, 47, 0.98);
      cursor: default;
    }

    .left-cell.long-pressing {
      outline: 2px solid rgba(106,166,255,.7);
      outline-offset: -3px;
    }

    .item-name {
      font-size: 11px;
      font-weight: 850;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .item-sub {
      font-size: 10px;
      color: #d1d5db;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .item-address {
      font-size: 12px;
      color: var(--text);
      font-weight: 800;
      line-height: 1.15;
    }

    .item-key {
      font-size: 10px;
      color: var(--muted);
      line-height: 1.15;
      font-weight: 700;
    }

    .item-key-value {
      color: #facc15;
      font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-weight: 950;
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
    }

    .cal-cell {
      min-width: var(--cellw);
      height: var(--rowh);
      padding: 3px;
      touch-action: pan-x;
      background: rgba(255,255,255,0.018);
      position: relative;
      cursor: default;
      touch-action: manipulation;
    }

    .cal-cell:nth-child(odd) {
      background: rgba(255,255,255,0.026);
    }

    .cal-cell.has-event {
      background: rgba(106, 166, 255, 0.05);
    }

    .mini-card {
      pointer-events: none;
      width: 100%;
      height: 100%;
      border-radius: 9px;
      border: 1px solid rgba(255,255,255,0.08);
      background: var(--card-color, rgba(106,166,255,.28));
      padding: 3px;
      overflow: hidden;
      color: #f8fafc;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 3px;
    }

    .mini-content {
      font-size: 17px;
      font-weight: 950;
      line-height: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .mini-line {
      width: 100%;
      color: rgba(255,255,255,.9);
      font-size: 11px;
      font-weight: 750;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mini-placeholder {
      font-size: 14px;
      color: rgba(255,255,255,.75);
    }

    .cal-cell.stay-chain {
      padding-left: 0;
      padding-right: 0;
    }

    .cal-cell.stay-chain.stay-start {
      padding-left: 3px;
    }

    .cal-cell.stay-chain.stay-end {
      padding-right: 3px;
    }

    .mini-card.stay-start-card {
      border-top-right-radius: 0;
      border-bottom-right-radius: 0;
      border-right: 0;
    }

    .mini-card.stay-middle-card {
      border-radius: 0;
      border-left: 0;
      border-right: 0;
      box-shadow: none;
    }

    .mini-card.stay-end-card {
      border-top-left-radius: 0;
      border-bottom-left-radius: 0;
      border-left: 0;
    }

    .mini-card.stay-single-card {
      border-radius: 9px;
    }

    .cal-cell.stay-chain .mini-content,
    .cal-cell.stay-chain .mini-line {
      visibility: hidden;
    }

    .cal-cell.stay-chain.stay-text-active .mini-content,
    .cal-cell.stay-chain.stay-text-active .mini-line {
      visibility: visible;
    }

    .cal-cell.stay-chain.stay-text-active .mini-content {
      font-size: 16px;
    }

    .cal-cell.stay-chain.stay-text-active .mini-line {
      font-size: 10px;
    }

    .activity-card {
      pointer-events: none;
      width: 100%;
      height: 100%;
      border-radius: 8px;
      background: rgba(255,255,255,0.04);
      display: grid;
      place-items: center;
      padding: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-align: center;
      white-space: nowrap;
      line-height: 1.12;
    }

    .activity-card.has-time {
      color: var(--text);
      background: rgba(250, 204, 21, 0.16);
      border: 1px solid rgba(250, 204, 21, 0.25);
    }

    .activity-tilde {
      color: var(--muted);
      font-size: 12px;
      line-height: 1;
    }

    .activity-more {
      font-size: 10px;
      color: #fde68a;
      font-weight: 900;
      line-height: 1;
    }

    .activity-total-time {
      color: #facc15;
      font-size: 17px;
      font-weight: 950;
      line-height: 1;
      letter-spacing: 0.02em;
    }

    /* ── Sheets ── */
    .sheet-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(0,0,0,.56);
      display: none;
      animation: backdropIn 0.18s ease;
    }

    .sheet-backdrop.show { display: block; }

    @keyframes backdropIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .sheet {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      max-height: 92dvh;
      overflow: auto;
      padding: 16px;
      border-radius: 22px 22px 0 0;
      border-top: 1px solid rgba(255,255,255,.12);
      background: rgba(23, 26, 34, .96);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      animation: sheetUp 0.22s cubic-bezier(.32,1,.32,1);
    }

    @keyframes sheetUp {
      from { transform: translateY(60px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .sheet-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .sheet h2 {
      margin: 0;
      font-size: 18px;
    }

    .sheet-close {
      width: 40px;
      height: 40px;
      min-width: 40px;
      padding: 0;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.08);
      color: var(--text);
      font-size: 22px;
      display: grid;
      place-items: center;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin: 10px 0 4px;
    }

    input, textarea, select {
      width: 100%;
      max-width: 100%;
      border: 1px solid var(--border);
      background: #10131b;
      color: var(--text);
      border-radius: 12px;
      padding: 11px;
      font-size: 16px;
    }

    input[readonly] {
      cursor: pointer;
    }

    #eventStayEndDisplay {
      margin-top: 6px;
      color: var(--muted);
    }

    textarea {
      min-height: 72px;
      resize: vertical;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 0.72fr;
      gap: 8px;
    }

    .time-row {
      display: grid;
      grid-template-columns: 116px 116px;
      gap: 12px;
      align-items: end;
      justify-content: center;
    }

    .time-row > div {
      min-width: 0;
      width: 116px;
      max-width: 116px;
    }

    .time-row label {
      font-size: 12px;
      line-height: 1.1;
      margin-bottom: 6px;
      white-space: nowrap;
      text-align: center;
    }

    .time-row input[type="time"] {
      display: block;
      box-sizing: border-box;
      width: 116px;
      max-width: 116px;
      min-width: 0;
      padding: 11px 8px;
      font-size: 16px;
      line-height: 1.2;
      text-align: center;
    }

    .palette {
      display: flex;
      gap: 10px;
      padding: 4px 0 2px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .palette::-webkit-scrollbar { display: none; }

    .color-dot {
      width: 34px;
      height: 34px;
      min-width: 34px;
      border-radius: 999px;
      border: 3px solid transparent;
      padding: 0;
      background: var(--dot);
      box-shadow: 0 0 0 1px rgba(255,255,255,.18);
    }

    .color-dot.selected {
      border-color: #fff;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .actions button {
      padding: 8px 10px;
      font-size: 13px;
      border-radius: 10px;
    }

    .delete {
      background: #3a1d22;
      color: #ff9aa2;
    }

    .save {
      background: var(--accent);
      color: #06101f;
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.55;
      margin-top: 8px;
    }

    .select-add-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
    }

    .add-small {
      height: 46px;
      padding: 0 12px;
      white-space: nowrap;
    }

    .activity-list {
      display: grid;
      gap: 8px;
      margin: 12px 0;
    }

    .activity-list-card {
      width: 100%;
      text-align: left;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      border-radius: 14px;
      padding: 10px;
      display: grid;
      gap: 4px;
    }

    .activity-list-time {
      font-size: 17px;
      font-weight: 900;
      color: var(--text);
    }

    .activity-list-meta {
      font-size: 13px;
      color: #d1d5db;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .activity-editor {
      display: none;
      border: 1px solid rgba(106,166,255,.25);
      border-radius: 16px;
      padding: 12px;
      margin: 12px 0;
      background: rgba(106,166,255,.06);
    }

    .activity-editor.show { display: block; }

    .activity-list-duration {
      color: #facc15;
      font-size: 14px;
      font-weight: 950;
      line-height: 1.2;
    }

    .activity-staff-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 36px;
      padding: 8px;
      margin-top: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      background: rgba(255,255,255,0.035);
    }

    .activity-staff-tag {
      border: 1px solid rgba(106,166,255,.35);
      background: rgba(106,166,255,.16);
      color: var(--text);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 800;
      line-height: 1;
      user-select: none;
      -webkit-user-select: none;
    }

    .activity-staff-tag.removing {
      outline: 2px solid rgba(255,91,91,.75);
      background: rgba(255,91,91,.18);
    }

    .activity-staff-empty {
      color: var(--muted);
      font-size: 12px;
      align-self: center;
    }

    .activity-add-row {
      display: flex;
      justify-content: center;
      margin: 10px 0 4px;
    }

    .activity-add-button {
      touch-action: manipulation;
      position: relative;
      z-index: 5;
      width: 46px;
      height: 46px;
      min-width: 46px;
      padding: 0;
      border-radius: 999px;
      background: rgba(106,166,255,.16);
      border: 1px solid rgba(106,166,255,.35);
      color: var(--text);
      font-size: 26px;
      line-height: 1;
      display: grid;
      place-items: center;
    }

    .activity-edit-actions {
      margin-top: 10px;
      grid-template-columns: repeat(3, max-content);
      justify-content: end;
    }

    .activity-edit-actions button {
      min-width: 64px;
      padding: 7px 10px;
      font-size: 12px;
    }

    /* ── Item Detail Card ── */
    .item-detail-card {
      border-radius: 18px;
      overflow: hidden;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .detail-header {
      padding: 18px 18px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .detail-name {
      font-size: 19px;
      font-weight: 900;
      line-height: 1.3;
      overflow-wrap: anywhere;
      margin-bottom: 4px;
    }

    .detail-sub {
      font-size: 14px;
      color: #a0aec0;
      font-weight: 600;
      overflow-wrap: anywhere;
    }

    .detail-rows {
      display: flex;
      flex-direction: column;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 72px 1fr;
      align-items: center;
      gap: 12px;
      padding: 13px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-row-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .detail-row-value {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      overflow-wrap: anywhere;
    }

    .detail-row-value.empty {
      color: rgba(156,163,175,0.4);
      font-weight: 500;
      font-size: 14px;
    }

    .detail-row-value.key-value {
      font-size: 18px;
      font-weight: 950;
      color: #facc15;
      letter-spacing: 0.05em;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-variant-numeric: tabular-nums;
    }

    .detail-edit-row {
      margin-top: 14px;
      display: flex;
      justify-content: flex-end;
    }

    .detail-edit-icon-button {
      width: 44px;
      height: 44px;
      min-width: 44px;
      padding: 0;
      border-radius: 999px;
      border: 1px solid rgba(106,166,255,.35);
      background: rgba(106,166,255,.16);
      color: var(--text);
      font-size: 22px;
      line-height: 1;
      display: grid;
      place-items: center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    }

    .detail-edit-icon-button:active {
      transform: scale(0.94);
      background: rgba(106,166,255,.24);
    }

    @media (max-width: 390px) {
      .time-row {
        grid-template-columns: 108px 108px;
        gap: 10px;
      }

      .time-row > div {
        width: 108px;
        max-width: 108px;
      }

      .time-row input[type="time"] {
        width: 108px;
        max-width: 108px;
        font-size: 16px;
        padding: 10px 6px;
      }
    }

    @media (max-width: 350px) {
      .time-row {
        grid-template-columns: 102px 102px;
        gap: 8px;
      }

      .time-row > div {
        width: 102px;
        max-width: 102px;
      }

      .time-row input[type="time"] {
        width: 102px;
        max-width: 102px;
        font-size: 15px;
        padding: 10px 5px;
      }
    }

    /* 活動時間の時刻選択だけに効かせる */
    .activity-time-row {
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      align-items: end;
    }

    .activity-time-field {
      min-width: 0;
      width: 100%;
    }

    .activity-time-field label {
      font-size: 12px;
      line-height: 1.1;
      margin-bottom: 6px;
      white-space: nowrap;
      text-align: center;
    }

    .activity-time-picker {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      gap: 6px;
      align-items: center;
      border: 1px solid var(--border);
      background: #10131b;
      border-radius: 12px;
      padding: 8px;
    }

    .activity-time-picker span {
      color: var(--muted);
      font-weight: 900;
      font-size: 17px;
      line-height: 1;
      text-align: center;
      min-width: 8px;
    }

    .activity-time-picker select {
      width: 100%;
      min-width: 0;
      height: 42px;
      border: 0;
      border-radius: 8px;
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-size: 17px;
      font-weight: 850;
      text-align: center;
      text-align-last: center;
      padding: 0 2px;
    }

    @media (max-width: 520px) {
      .activity-time-row {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .activity-time-picker {
        grid-template-columns: 1fr auto 1fr;
        gap: 8px;
        padding: 8px;
      }

      .activity-time-picker select {
        height: 44px;
        font-size: 18px;
      }
    }

    @media (max-width: 350px) {
      .activity-time-picker {
        gap: 6px;
        padding: 7px;
      }

      .activity-time-picker select {
        height: 42px;
        font-size: 17px;
      }
    }

    @media (min-width: 820px) {
      :root {
        --cellw: 104px;
        --leftw: 220px;
        --rowh: 74px;
      }

      body {
        max-width: 1100px;
        margin: 0 auto;
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
      }
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="month-row">
      <button id="prevMonthBtn">＜</button>
      <div class="month-title" id="monthTitle">2026年5月</div>
      <button id="nextMonthBtn">＞</button>
    </div>

      <button id="todayBtn">今日</button>
      <button id="exportBtn">バックアップ</button>

  <main class="calendar-scroll" id="calendarScroll">
    <div class="calendar-grid" id="calendarGrid"></div>

</div>

<!-- Event Sheet -->
<div class="sheet-backdrop" id="eventSheetBackdrop">

    <div class="sheet-head">
      <h2 id="eventSheetTitle">予定を編集</h2>
      <button class="sheet-close" id="eventCloseBtn" type="button">×</button>
    </div>

    <input type="hidden" id="editingDate">
    <input type="hidden" id="editingItemId">

    <label>カード枠の色</label>

    <div class="form-row">
      <div>
        <label>人数</label>
        <select id="eventPeopleInput"></select>
      </div>
      <div>
        <label>利用者</label>
        <input id="eventUserInput" placeholder="例：山田">
      </div>
    </div>

    <label>担当者</label>
    <input id="eventStaffInput" placeholder="例：田中">

    <label>連泊終了日</label>
    <input type="date" id="eventStayEndInput">
    <div class="hint" id="eventStayEndDisplay">連泊終了日を指定してください</div>
    <div class="hint">指定すると、この日まで同じ内容を自動で入力します。</div>

    <label>メモ</label>
    <textarea id="eventNoteInput" placeholder="備考"></textarea>

    <div class="actions">

</div>

<!-- Item Edit Sheet -->
<div class="sheet-backdrop" id="itemSheetBackdrop">
  <div class="sheet">
    <div class="sheet-head">
      <h2 id="itemSheetTitle">項目を編集</h2>
      <button class="sheet-close" id="itemCloseBtn" type="button">×</button>
    </div>

    <input type="hidden" id="editingItemSheetId">

    <label>場所・物件</label>
    <input id="itemNameInput" placeholder="例：レイクウエスト 4-711">

    <label>建物名・屋号など</label>
    <input id="itemSubInput" placeholder="例：ウエストヒルズ邸">

    <label>住所・番号など</label>

    <div class="actions">
      <button class="delete" id="itemDeleteBtn">削除</button>
      <button class="save" id="itemSaveBtn">保存</button>
    </div>
  </div>
</div>

<!-- Activity Sheet -->
<div class="sheet-backdrop" id="activitySheetBackdrop">
  <div class="sheet">
    <div class="sheet-head">
      <h2>活動時間</h2>
      <button class="sheet-close" id="activityCloseBtn" type="button">×</button>
    </div>

    <input type="hidden" id="activityDateInput">
    <input type="hidden" id="activityEditingId">

    <label>日付</label>
    <input id="activityInfoInput" readonly>

    <div class="activity-list" id="activityList"></div>

    <div class="activity-editor" id="activityEditor">
      <div class="time-row activity-time-row">
        <div class="activity-time-field">
          <label>開始時間</label>
          <input type="hidden" id="activityStartInput">
          <div class="activity-time-picker">
            <select id="activityStartHour" aria-label="開始 時"></select>

        <div class="activity-time-field">
          <label>終了時間</label>
          <input type="hidden" id="activityEndInput">
          <div class="activity-time-picker">

<!-- Item Detail Sheet -->
<div class="sheet-backdrop" id="itemDetailBackdrop">
  <div class="sheet">
    <div class="sheet-head">
      <h2>物件詳細</h2>
      <button class="sheet-close" id="itemDetailCloseBtn" type="button">×</button>
    </div>

    <div id="itemDetailCard"></div>

    <div class="detail-edit-row">
      <button class="detail-edit-icon-button" id="itemDetailEditBtn" type="button" aria-label="編集" title="編集">✏️</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = "cleaning_calendar_grid_v1";

  const COLORS = [
    "#6aa6ff55",
    "#ff5b5b55",
    "#ffd16666",
    "#7bd88f55",
    "#c084fc55",
    "#ff9f4355",
    "#4dd4ac55"
  ];

  const DEFAULT_ACTIVITY_CONTENTS = ["清掃", "準備", "移動", "確認", "その他"];
  const DEFAULT_ACTIVITY_STAFFS = [];

  const DEFAULT_ITEMS = [
    { id: "activity", type: "activity", name: "活動時間", sub: "", address: "", key: "" },
    { id: "place_lakewest_4711", type: "place", name: "レイクウエスト 4-711", sub: "ウエストヒルズ邸", address: "1049-3", key: "" },
    { id: "place_kohan_sauna_4656", type: "place", name: "湖辺のくつろぎ、時々サウナ (4-656)", sub: "由井邸", address: "1039-7", key: "" },
    { id: "place_lake_terrace_6904", type: "place", name: "LAKE Terrace 6-904", sub: "早坂邸", address: "1432-179", key: "" },
    { id: "place_takashima_best_so", type: "place", name: "TAKASHIMA BEST SO (4-625/626)", sub: "加藤邸", address: "1039-90", key: "" },
    { id: "place_fusha_biwako_1011", type: "place", name: "風車村 びわ湖の家 1011 (4-657)", sub: "伊藤邸", address: "1039-96", key: "" },
    { id: "place_koco_1220", type: "place", name: "湖Co (12-20)", sub: "高橋邸", address: "1431-29", key: "" },
    { id: "place_lake_terrace_4661", type: "place", name: "LAKE Terrace 4-661", sub: "堂阪邸", address: "1039-74", key: "" }
  ];

  let state = loadState();
  let current = new Date();
  let selectedColor = COLORS[0];
  let currentDetailItemId = "";
  let activitySelectedStaffs = [];

  const calendarScroll = document.getElementById("calendarScroll");
  const calendarGrid   = document.getElementById("calendarGrid");
  const monthTitle     = document.getElementById("monthTitle");

  const eventSheetBackdrop    = document.getElementById("eventSheetBackdrop");
  const itemSheetBackdrop     = document.getElementById("itemSheetBackdrop");
  const activitySheetBackdrop = document.getElementById("activitySheetBackdrop");
  const itemDetailBackdrop    = document.getElementById("itemDetailBackdrop");
  const itemDetailCard        = document.getElementById("itemDetailCard");

  const editingDate      = document.getElementById("editingDate");
  const editingItemId    = document.getElementById("editingItemId");
  const eventUserInput   = document.getElementById("eventUserInput");
  const eventPeopleInput = document.getElementById("eventPeopleInput");
  const eventStaffInput  = document.getElementById("eventStaffInput");
  const eventStayEndInput = document.getElementById("eventStayEndInput");
  const eventStayEndDisplay = document.getElementById("eventStayEndDisplay");
  const eventNoteInput   = document.getElementById("eventNoteInput");
  const colorPalette     = document.getElementById("colorPalette");

  const editingItemSheetId = document.getElementById("editingItemSheetId");
  const itemNameInput      = document.getElementById("itemNameInput");
  const itemSubInput       = document.getElementById("itemSubInput");
  const itemAddressInput   = document.getElementById("itemAddressInput");
  const itemKeyInput       = document.getElementById("itemKeyInput");

  const activityDateInput    = document.getElementById("activityDateInput");
  const activityInfoInput    = document.getElementById("activityInfoInput");
  const activityEditingId    = document.getElementById("activityEditingId");
  const activityList         = document.getElementById("activityList");
  const activityEditor       = document.getElementById("activityEditor");
  const activityStartInput   = document.getElementById("activityStartInput");
  const activityEndInput     = document.getElementById("activityEndInput");
  const activityStartHour    = document.getElementById("activityStartHour");
  const activityStartMinute  = document.getElementById("activityStartMinute");
  const activityEndHour      = document.getElementById("activityEndHour");
  const activityEndMinute    = document.getElementById("activityEndMinute");
  const activityContentInput = document.getElementById("activityContentInput");
  const activityStaffInput   = document.getElementById("activityStaffInput");
  const activityStaffTags    = document.getElementById("activityStaffTags");
  const activityDuration     = null;

  [activityStartHour, activityStartMinute, activityEndHour, activityEndMinute].forEach(select => {
    select.addEventListener("change", () => {
      syncActivityTimeInputsFromPicker();
      updateActivityDuration();
    });
  });

  activityStaffInput.addEventListener("change", () => {
    if (activityStaffInput.value) {
      addActivityStaffTag(activityStaffInput.value);
      activityStaffInput.value = "";
    }
  });

  function safeTap(el, callback) {
    if (!el) return;

    let firedAt = 0;

    function run(e) {
      const now = Date.now();
      if (now - firedAt < 250) return;
      firedAt = now;

      if (e) {
        e.preventDefault();
        e.stopPropagation();
      }

      callback();
    }

    el.addEventListener("click", run);
    el.addEventListener("touchend", run, { passive: false });
  }

  // ── Header buttons ──────────────────────────────────────────
  document.getElementById("prevMonthBtn").onclick = () => {
    current.setMonth(current.getMonth() - 1);
    renderCalendar(true);
  };
  document.getElementById("nextMonthBtn").onclick = () => {
    current.setMonth(current.getMonth() + 1);
    renderCalendar(true);
  };
  document.getElementById("todayBtn").onclick = () => {
    current = new Date();
    renderCalendar(false);
    requestAnimationFrame(() => scrollToDate(toDateString(new Date())));
  };

  document.getElementById("exportBtn").onclick = exportBackup;
  document.getElementById("importBtn").onclick = () => document.getElementById("importFile").click();
  document.getElementById("importFile").onchange = importBackup;

  eventStayEndInput.addEventListener("input", updateStayEndDisplay);
  eventStayEndInput.addEventListener("change", updateStayEndDisplay);
  eventStayEndInput.addEventListener("blur", updateStayEndDisplay);


  function normalizeDateInputValue(value) {
    const str = String(value || "").trim();
    return /^\d{4}-\d{2}-\d{2}$/.test(str) ? str : "";
  }

  function updateStayEndDisplay() {
    const value = normalizeDateInputValue(eventStayEndInput.value);
    eventStayEndInput.value = value;

    if (!value) {
      eventStayEndDisplay.textContent = "連泊終了日を指定してください";
      return;
    }

    const d = parseLocalDate(value);
    if (!d) {
      eventStayEndDisplay.textContent = "連泊終了日を指定してください";
      return;
    }

    const week = ["日", "月", "火", "水", "木", "金", "土"][d.getDay()];
    eventStayEndDisplay.textContent = `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()}（${week}）`;
  }

  function saveEventRange(startDateStr, endDateStr, itemId, baseEv) {
    const start = parseLocalDate(startDateStr);
    const end = parseLocalDate(endDateStr);

    if (!start) return;

    // 終了日未指定、または開始日より前なら当日のみ保存
    if (!end || end < start) {
      state.events[eventKey(startDateStr, itemId)] = {
        ...baseEv,
        date: startDateStr,
        stayEndDate: ""
      };
      return;
    }

    for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
      const dateStr = toDateString(d);
      state.events[eventKey(dateStr, itemId)] = {
        ...baseEv,
        date: dateStr,
        stayEndDate: endDateStr
      };
    }
  }

  function makeStayKey(ev) {
    return [
      ev?.itemId || "",
      ev?.stayEndDate || "",
      ev?.people || "",
      ev?.user || "",
      ev?.staff || "",
      ev?.note || "",
      ev?.color || ""
    ].join("|");
  }

  function updateStayTextPositions() {
    const cells = [...calendarGrid.querySelectorAll(".cal-cell.stay-chain")];
    if (!cells.length) return;

    cells.forEach(cell => cell.classList.remove("stay-text-active"));

    const leftWidth = parseInt(getComputedStyle(document.documentElement).getPropertyValue("--leftw")) || 0;
    const visibleLeft = calendarScroll.scrollLeft + leftWidth;
    const visibleRight = calendarScroll.scrollLeft + calendarScroll.clientWidth;
    const targetX = visibleLeft + Math.max(0, (visibleRight - visibleLeft) * 0.35);

    const groups = new Map();
    cells.forEach(cell => {
      const key = cell.dataset.stayKey || "";
      if (!key) return;

      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(cell);
    });

    groups.forEach(groupCells => {
      const visible = groupCells.filter(cell => {
        const left = cell.offsetLeft;
        const right = left + cell.offsetWidth;
        return right > visibleLeft && left < visibleRight;
      });

      const candidates = visible.length ? visible : groupCells;

      let best = null;
      let bestDistance = Infinity;

      candidates.forEach(cell => {
        const center = cell.offsetLeft + cell.offsetWidth / 2;
        const distance = Math.abs(center - targetX);

        if (distance < bestDistance) {
          bestDistance = distance;
          best = cell;
        }
      });

      if (best) best.classList.add("stay-text-active");
    });
  }

  function getStaySegment(dateStr, itemId, ev) {
    if (!ev || !ev.stayEndDate) return "single";

    const current = parseLocalDate(dateStr);
    const end = parseLocalDate(ev.stayEndDate);
    if (!current || !end || current > end) return "single";

    const prevDate = addDays(dateStr, -1);
    const nextDate = addDays(dateStr, 1);

    const prev = getEvent(prevDate, itemId);
    const next = getEvent(nextDate, itemId);

    const hasPrev = isSameStayEvent(ev, prev);
    const hasNext = isSameStayEvent(ev, next);

    if (!hasPrev && hasNext) return "start";
    if (hasPrev && hasNext) return "middle";
    if (hasPrev && !hasNext) return "end";
    return "single";
  }

  function isSameStayEvent(a, b) {
    if (!a || !b) return false;
    if (!a.stayEndDate || !b.stayEndDate) return false;

    return String(a.stayEndDate || "") === String(b.stayEndDate || "") &&
      String(a.itemId || "") === String(b.itemId || "") &&
      String(a.people || "") === String(b.people || "") &&
      String(a.user || "") === String(b.user || "") &&
      String(a.staff || "") === String(b.staff || "") &&
      String(a.note || "") === String(b.note || "") &&
      String(a.color || "") === String(b.color || "");
  }

  function addDays(dateStr, amount) {
    const d = parseLocalDate(dateStr);
    if (!d) return "";
    d.setDate(d.getDate() + amount);
    return toDateString(d);
  }

  // ── Event Sheet ──────────────────────────────────────────────
  document.getElementById("eventCloseBtn").onclick = closeEventSheet;
  document.getElementById("eventSaveBtn").onclick  = saveEventFromSheet;
  document.getElementById("eventDeleteBtn").onclick = deleteEventFromSheet;
  eventSheetBackdrop.addEventListener("click", e => {
    if (e.target === eventSheetBackdrop) closeEventSheet();
  });

  // ── Item Sheet ───────────────────────────────────────────────
  document.getElementById("itemCloseBtn").onclick  = closeItemSheet;
  document.getElementById("itemSaveBtn").onclick   = saveItemFromSheet;
  document.getElementById("itemDeleteBtn").onclick = deleteItemFromSheet;
  itemSheetBackdrop.addEventListener("click", e => {
    if (e.target === itemSheetBackdrop) closeItemSheet();
  });

  // ── Item Detail Sheet ────────────────────────────────────────
  document.getElementById("itemDetailCloseBtn").onclick = closeItemDetailSheet;
  document.getElementById("itemDetailEditBtn").onclick = () => {
    const item = state.items.find(x => x.id === currentDetailItemId);
    if (!item || item.type === "activity") return;

    closeItemDetailSheet();
    openItemSheet(item);
  };
  itemDetailBackdrop.addEventListener("click", e => {
    if (e.target === itemDetailBackdrop) closeItemDetailSheet();
  });

  // ── Activity Sheet buttons ───────────────────────────────────
  safeTap(document.getElementById("activityCloseBtn"), closeActivitySheet);
  safeTap(document.getElementById("activityAddBtn"), () => openActivityEntryEditor());
  safeTap(document.getElementById("activityBackBtn"), closeActivityEntryEditor);
  safeTap(document.getElementById("activityEntrySaveBtn"), saveActivityTimeFromSheet);
  safeTap(document.getElementById("activityEntryDeleteBtn"), deleteActivityEntryFromEditor);

  setupActivityOptionButton("activityContentAddBtn", "activityContents", "内容を追加", activityContentInput, renderActivityContentOptions);
  setupActivityOptionButton("activityStaffAddBtn", "activityStaffs", "担当を追加", activityStaffInput, renderActivityStaffOptions);

  activitySheetBackdrop.addEventListener("click", e => {
    if (e.target === activitySheetBackdrop) closeActivitySheet();
  });

  // ── State ────────────────────────────────────────────────────
  function loadState() {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (saved && Array.isArray(saved.items)) {
        return {
          items: saved.items,
          events: saved.events || {},
          activityTimes: saved.activityTimes || {},
          activityContents: Array.isArray(saved.activityContents) ? saved.activityContents : DEFAULT_ACTIVITY_CONTENTS.slice(),
          activityStaffs: Array.isArray(saved.activityStaffs) ? saved.activityStaffs : DEFAULT_ACTIVITY_STAFFS.slice()
        };
      }
    } catch {}

    return {
      items: DEFAULT_ITEMS.slice(),
      events: {},
      activityTimes: {},
      activityContents: DEFAULT_ACTIVITY_CONTENTS.slice(),
      activityStaffs: DEFAULT_ACTIVITY_STAFFS.slice()
    };
  }

  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch {
      alert("保存できませんでした。GitHub PagesなどのURLからSafari/Chromeで開いてください。");
    }
  }




  // ── Render ───────────────────────────────────────────────────
  function renderCalendar(resetScroll = false) {
    const days = getMonthDates(current);
    const rows = state.items.length;

    calendarGrid.style.setProperty("--days", days.length);
    calendarGrid.style.setProperty("--rows", rows);
    monthTitle.textContent = `${current.getFullYear()}年${current.getMonth() + 1}月`;
    calendarGrid.innerHTML = "";

    // Corner
    const corner = document.createElement("div");
    corner.className = "corner";
    corner.innerHTML = `
      <span>項目 / 日付</span>
      <button class="corner-add" id="cornerAddItemBtn" type="button" title="項目追加" aria-label="項目追加">＋</button>
    `;
    calendarGrid.appendChild(corner);
    safeTap(corner.querySelector("#cornerAddItemBtn"), openItemSheet);

    // Date headers
    for (const date of days) {
      const head = document.createElement("div");
      const dateStr = toDateString(date);
      const day = date.getDay();
      head.className = "date-head" + (isToday(date) ? " today" : "") + (day === 0 ? " sun" : "") + (day === 6 ? " sat" : "");
      head.dataset.date = dateStr;
      head.innerHTML = `
        <div>
          <div class="date-num">${date.getDate()}日</div>
          <div class="date-week">${["日","月","火","水","木","金","土"][day]}</div>
        </div>
      `;
      head.onclick = () => scrollToDate(dateStr);
      calendarGrid.appendChild(head);
    }

    // Rows
    state.items.forEach(item => {
      const left = document.createElement("div");
      left.className = "left-cell" + (item.type === "activity" ? " activity" : "");
      left.dataset.itemId = item.id;
      left.innerHTML = item.type === "activity"
        ? `<div class="item-name">活動時間</div>`
        : `
          <div class="item-name">${escapeHtml(getTopDisplayName(item))}</div>
          ${item.sub ? `<div class="item-sub">${escapeHtml(item.sub)}</div>` : ""}
          <div class="item-key">鍵：${item.key ? escapeHtml(item.key) : "─"}</div>
        `;

      if (item.type !== "activity") {
        setupItemPress(left, item);
      }

      calendarGrid.appendChild(left);

      for (const date of days) {
        const dateStr = toDateString(date);
        const cell = document.createElement("div");
        cell.className = "cal-cell";
        cell.dataset.date = dateStr;
        cell.dataset.itemId = item.id;

        if (item.type === "activity") {
          const time = state.activityTimes[dateStr];
          cell.innerHTML = renderActivityCell(time);
          if (normalizeActivityEntries(time).length > 0) cell.classList.add("has-event");
        } else {
          const ev = getEvent(dateStr, item.id);
          const staySegment = getStaySegment(dateStr, item.id, ev);
          cell.innerHTML = renderEventCell(ev, staySegment);
          if (ev) cell.classList.add("has-event");
          if (staySegment !== "single") {
            cell.classList.add("stay-chain", `stay-${staySegment}`);
            cell.dataset.stayKey = makeStayKey(ev);
          }
        }

        setupCalendarCellPress(cell, dateStr, item.id);
        calendarGrid.appendChild(cell);
      }
    });

    updateStayTextPositions();

    if (resetScroll) {
      setTimeout(() => scrollToDate(toDateString(new Date(current.getFullYear(), current.getMonth(), 1))), 0);
    }
  }

  function getMonthDates(baseDate) {
    const start = new Date(baseDate.getFullYear(), baseDate.getMonth(), 1);
    const end   = new Date(baseDate.getFullYear(), baseDate.getMonth() + 1, 0);
    const result = [];
    for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
      result.push(new Date(d));
    }
    return result;
  }

  function renderActivityCell(timeData) {
    const entries = normalizeActivityEntries(timeData);
    if (entries.length === 0) {
      return `<div class="activity-card">＋</div>`;
    }

    const total = formatTotalActivityDuration(entries);
    return `<div class="activity-card has-time">
      <div class="activity-total-time">${escapeHtml(total || "0時間")}</div>
    </div>`;
  }

  function renderEventCell(ev, staySegment = "single") {
    if (!ev) return "";
    const color = ev.color || COLORS[0];
    const segmentClass = {
      start: "stay-start-card",

  // ── Event helpers ────────────────────────────────────────────
  function eventKey(dateStr, itemId) { return `${dateStr}|${itemId}`; }
  function getEvent(dateStr, itemId) { return state.events[eventKey(dateStr, itemId)] || null; }

  function normalizeDateInputValue(value) {
    const str = String(value || "").trim();
    return /^\d{4}-\d{2}-\d{2}$/.test(str) ? str : "";
  }

  function updateStayEndDisplay() {
    const value = normalizeDateInputValue(eventStayEndInput.value);
    eventStayEndInput.value = value;

    if (!value) {
      eventStayEndDisplay.textContent = "連泊終了日を指定してください";
      return;
    }

    const d = parseLocalDate(value);
    if (!d) {
      eventStayEndDisplay.textContent = "連泊終了日を指定してください";
      return;
    }

    const week = ["日", "月", "火", "水", "木", "金", "土"][d.getDay()];
    eventStayEndDisplay.textContent = `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()}（${week}）`;
  }

  function saveEventRange(startDateStr, endDateStr, itemId, baseEv) {
    const start = parseLocalDate(startDateStr);
    const end = parseLocalDate(endDateStr);

    if (!start) return;

    // 終了日未指定、または開始日より前なら当日のみ保存
    if (!end || end < start) {
      state.events[eventKey(startDateStr, itemId)] = {
        ...baseEv,
        date: startDateStr,
        stayEndDate: ""
      };
      return;
    }

    for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
      const dateStr = toDateString(d);
      state.events[eventKey(dateStr, itemId)] = {
        ...baseEv,
        date: dateStr,
        stayEndDate: endDateStr
      };
    }
  }

  function makeStayKey(ev) {
    return [
      ev?.itemId || "",
      ev?.stayEndDate || "",
      ev?.people || "",
      ev?.user || "",
      ev?.staff || "",
      ev?.note || "",
      ev?.color || ""
    ].join("|");
  }

  function updateStayTextPositions() {
    const cells = [...calendarGrid.querySelectorAll(".cal-cell.stay-chain")];
    if (!cells.length) return;

    cells.forEach(cell => cell.classList.remove("stay-text-active"));

    const leftWidth = parseInt(getComputedStyle(document.documentElement).getPropertyValue("--leftw")) || 0;
    const visibleLeft = calendarScroll.scrollLeft + leftWidth;
    const visibleRight = calendarScroll.scrollLeft + calendarScroll.clientWidth;
    const targetX = visibleLeft + Math.max(0, (visibleRight - visibleLeft) * 0.35);

    const groups = new Map();
    cells.forEach(cell => {
      const key = cell.dataset.stayKey || "";
      if (!key) return;

      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(cell);
    });

    groups.forEach(groupCells => {
      const visible = groupCells.filter(cell => {
        const left = cell.offsetLeft;
        const right = left + cell.offsetWidth;
        return right > visibleLeft && left < visibleRight;
      });

      const candidates = visible.length ? visible : groupCells;

      let best = null;
      let bestDistance = Infinity;

      candidates.forEach(cell => {
        const center = cell.offsetLeft + cell.offsetWidth / 2;
        const distance = Math.abs(center - targetX);

        if (distance < bestDistance) {
          bestDistance = distance;
          best = cell;
        }
      });

      if (best) best.classList.add("stay-text-active");
    });
  }

  function getStaySegment(dateStr, itemId, ev) {
    if (!ev || !ev.stayEndDate) return "single";

    const current = parseLocalDate(dateStr);
    const end = parseLocalDate(ev.stayEndDate);
    if (!current || !end || current > end) return "single";

    const prevDate = addDays(dateStr, -1);
    const nextDate = addDays(dateStr, 1);

    const prev = getEvent(prevDate, itemId);
    const next = getEvent(nextDate, itemId);

    const hasPrev = isSameStayEvent(ev, prev);
    const hasNext = isSameStayEvent(ev, next);

    if (!hasPrev && hasNext) return "start";
    if (hasPrev && hasNext) return "middle";
    if (hasPrev && !hasNext) return "end";
    return "single";
  }

  function isSameStayEvent(a, b) {
    if (!a || !b) return false;
    if (!a.stayEndDate || !b.stayEndDate) return false;

    return String(a.stayEndDate || "") === String(b.stayEndDate || "") &&
      String(a.itemId || "") === String(b.itemId || "") &&
      String(a.people || "") === String(b.people || "") &&
      String(a.user || "") === String(b.user || "") &&
      String(a.staff || "") === String(b.staff || "") &&
      String(a.note || "") === String(b.note || "") &&
      String(a.color || "") === String(b.color || "");
  }

  function addDays(dateStr, amount) {
    const d = parseLocalDate(dateStr);
    if (!d) return "";
    d.setDate(d.getDate() + amount);
    return toDateString(d);
  }

  function normalizeActivityEntries(value) {
    if (!value) return [];

    if (Array.isArray(value)) {
      return value
        .filter(x => x && (x.start || x.end || x.content || x.staff))
        .map(x => {
          const staffs = normalizeStaffList(x.staffs ?? x.staff);
          return {
            id: x.id || makeId("act"),
            start: x.start || "",
            end: x.end || "",
            content: x.content || "",
            staffs,
            staff: staffs.join("、")
          };
        });
    }

    if (value.start || value.end) {
      const staffs = normalizeStaffList(value.staffs ?? value.staff);
      return [{
        id: value.id || makeId("act"),
        start: value.start || "",
        end: value.end || "",
        content: value.content || "",
        staffs,
        staff: staffs.join("、")
      }];
    }

    return [];
  }

  function editActivityOption(stateKey, selectEl, renderFn) {
    const oldValue = selectEl.value;
    if (!oldValue) {
      alert("編集する項目を選択してください。");
      return;
    }

    const newValueRaw = prompt("項目を編集\n※空にしてOKを押すと削除", oldValue);
    if (newValueRaw === null) return;

    const newValue = newValueRaw.trim();

    if (!Array.isArray(state[stateKey])) state[stateKey] = [];

    if (!newValue) {
      if (!confirm(`「${oldValue}」を削除しますか？`)) return;
      state[stateKey] = state[stateKey].filter(v => v !== oldValue);

      Object.keys(state.activityTimes || {}).forEach(dateStr => {
        const entries = normalizeActivityEntries(state.activityTimes[dateStr]).map(entry => {
          if (stateKey === "activityContents" && entry.content === oldValue) return { ...entry, content: "" };
          if (stateKey === "activityStaffs") {
            const staffs = normalizeStaffList(entry.staffs ?? entry.staff).filter(v => v !== oldValue);
            return { ...entry, staffs, staff: staffs.join("、") };
          }
          return entry;
        });
        setActivityEntriesForDate(dateStr, entries);
      });

      selectEl.value = "";
      renderFn("");
      saveState();
      return;

    state[stateKey] = [...new Set(state[stateKey].map(v => v === oldValue ? newValue : v))];

    Object.keys(state.activityTimes || {}).forEach(dateStr => {
      const entries = normalizeActivityEntries(state.activityTimes[dateStr]).map(entry => {
        if (stateKey === "activityContents" && entry.content === oldValue) return { ...entry, content: newValue };
        if (stateKey === "activityStaffs") {
          const staffs = normalizeStaffList(entry.staffs ?? entry.staff).map(v => v === oldValue ? newValue : v);
          return { ...entry, staffs, staff: staffs.join("、") };
        }
        return entry;
      });
      setActivityEntriesForDate(dateStr, entries);
    });

    saveState();
    renderFn(newValue);
    selectEl.value = newValue;
  }

  function setTimePickerValue(value, hourSelect, minuteSelect) {
    const match = String(value || "09:00").match(/^(\d{1,2}):(\d{2})$/);
    const hour = match ? String(Number(match[1])).padStart(2, "0") : "09";
    let minute = match ? Number(match[2]) : 0;

    minute = Math.round(minute / 5) * 5;
    if (minute >= 60) minute = 55;

    hourSelect.value = hour;
    minuteSelect.value = String(minute).padStart(2, "0");
    syncActivityTimeInputsFromPicker();
  }

  function normalizeStaffList(value) {
    if (Array.isArray(value)) {
      return [...new Set(value.map(v => String(v || "").trim()).filter(Boolean))];
    }

    return [...new Set(String(value || "")
      .split(/[、,\/\s]+/)
      .map(v => v.trim())
      .filter(Boolean))];

  function formatStaffs(entry) {

  function updateActivityDuration() {
    // 計算結果は登録済みカード側に表示する
  }

  function formatTotalActivityDuration(entries) {
    let totalMinutes = 0;

    normalizeActivityEntries(entries).forEach(entry => {
      const minutes = durationMinutes(entry.start, entry.end);
      if (minutes !== null) totalMinutes += minutes;
    });

    if (totalMinutes <= 0) return "0時間";

    const h = Math.floor(totalMinutes / 60);
    const m = totalMinutes % 60;

    if (m === 0) return `${h}時間`;
    if (h === 0) return `${m}分`;
    return `${h}時間${m}分`;
  }

  function durationMinutes(start, end) {
    if (!start || !end) return null;

    const startMin = timeToMinutes(start);
    const endMin = timeToMinutes(end);
    if (startMin === null || endMin === null) return null;

    let diff = endMin - startMin;
    if (diff < 0) diff += 24 * 60;

    return diff;
  }

  function formatDuration(start, end) {
    const diff = durationMinutes(start, end);
    if (diff === null) return "";

    const h = Math.floor(diff / 60);
    const m = diff % 60;

    if (h && m) return `${h}時間${m}分`;
    if (h) return `${h}時間`;
    return `${m}分`;
  }

  function timeToMinutes(value) {
    const m = String(value || "").match(/^(\d{1,2}):(\d{2})$/);
    if (!m) return null;

    const h = Number(m[1]);
    const min = Number(m[2]);
    if (h < 0 || h > 23 || min < 0 || min > 59) return null;

    return h * 60 + min;
  }

  }

  function closeItemDetailSheet() {
    itemDetailBackdrop.classList.remove("show");
    currentDetailItemId = "";
  }

  // ── Item press: tap = detail, long-press = edit ───────────────
  // 方針：pointerdown/pointermove/pointerup の1系統のみ使う。
  //       touchstart/end や click は追加しない（二重発火の原因）。
  //       pointerleave は使わない（スクロール中に誤キャンセルする）。
  //       左セルでは calendarGrid のバブリングハンドラを止める。
  function setupItemPress(el, item) {
    let active = false;
    let pointerId = null;
    let startX = 0;
    let startY = 0;
    let startSL = 0;
    let startST = 0;

    function cancel() {
      active = false;
      pointerId = null;
      el.classList.remove("long-pressing");
      try { el.releasePointerCapture && el.releasePointerCapture(pointerId); } catch {}
    }

    el.addEventListener("pointerdown", (e) => {
      if (e.pointerType === "mouse" && e.button !== 0) return;
      if (active) return;

      e.stopPropagation();

      active = true;
      pointerId = e.pointerId;
      startX = e.clientX;
      startY = e.clientY;
      startSL = calendarScroll.scrollLeft;
      startST = calendarScroll.scrollTop;

      try { el.setPointerCapture(e.pointerId); } catch {}
    });

    el.addEventListener("pointermove", (e) => {
      if (!active || e.pointerId !== pointerId) return;

      const moved =
        Math.abs(e.clientX - startX) > 10 ||
        Math.abs(e.clientY - startY) > 10 ||
        Math.abs(calendarScroll.scrollLeft - startSL) > 10 ||
        Math.abs(calendarScroll.scrollTop - startST) > 10;

      if (moved) cancel();
    });

    el.addEventListener("pointerup", (e) => {
      if (!active || e.pointerId !== pointerId) return;

      const scrolled =
        Math.abs(calendarScroll.scrollLeft - startSL) > 10 ||
        Math.abs(calendarScroll.scrollTop - startST) > 10;

      cancel();

      if (!scrolled) {
        e.stopPropagation();
        openItemDetailSheet(item);
      }
    });

    el.addEventListener("pointercancel", cancel);

    el.addEventListener("click", (e) => {
      e.preventDefault();
      e.stopPropagation();
      openItemDetailSheet(item);
    });

    // Android Chrome等でpointerup後のclickが潰れる場合の保険
    el.addEventListener("touchend", (e) => {
      if (active) return;
      e.preventDefault();
      e.stopPropagation();
      openItemDetailSheet(item);
    }, { passive: false });
  }

  // ── Colour palette / people ──────────────────────────────────
  function renderColorPalette() {
    colorPalette.innerHTML = "";
    COLORS.forEach(color => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "color-dot" + (selectedColor === color ? " selected" : "");
      btn.style.setProperty("--dot", color);
      btn.onclick = () => { selectedColor = color; renderColorPalette(); };
      colorPalette.appendChild(btn);
    });
  }

  function renderPeopleOptions(value = "") {
    let html = `<option value="">未入力</option>`;
    for (let i = 1; i <= 20; i++) html += `<option value="${i}">${i}名</option>`;
    eventPeopleInput.innerHTML = html;
    eventPeopleInput.value = value || "";
  }

  // ── Display helpers ──────────────────────────────────────────
  function getTopDisplayName(item) {
    const idMap = {
      "place_lakewest_4711":    "レイクウエスト",
      "place_kohan_sauna_4656": "湖辺のくつろぎ、時々サウナ",
      "place_lake_terrace_6904":"LAKE Terrace",
      "place_takashima_best_so":"TAKASHIMA BEST SO",
      "place_fusha_biwako_1011":"風車村 びわ湖の家",
      "place_koco_1220":        "湖Co",
      "place_lake_terrace_4661":"LAKE Terrace"
    };
    if (idMap[item.id]) return idMap[item.id];
    return String(item.name || "")
      .replace(/\s*\([^)]*\)\s*/g, " ")
      .replace(/\s+\d+-\d+.*$/g, "")
      .trim();
  }

  // ── Cell tap handler (grid cells only) ───────────────────────
  function setupCalendarCellPress(cell, dateStr, itemId) {
    let active = false;
    let pointerId = null;
    let startX = 0;
    let startY = 0;
    let startSL = 0;
    let startST = 0;
    let openedAt = 0;

    function open() {
      const now = Date.now();
      if (now - openedAt < 250) return;
      openedAt = now;

      const item = state.items.find(x => x.id === itemId);
      if (item?.type === "activity") {
        editActivityTime(dateStr);
      } else {
        openEventSheet(dateStr, itemId);
      }
    }

    function cancel() {
      active = false;
      pointerId = null;
      try { cell.releasePointerCapture && cell.releasePointerCapture(pointerId); } catch {}
    }

    cell.addEventListener("pointerdown", (e) => {
      if (e.pointerType === "mouse" && e.button !== 0) return;

      active = true;
      pointerId = e.pointerId;
      startX = e.clientX;
      startY = e.clientY;
      startSL = calendarScroll.scrollLeft;
      startST = calendarScroll.scrollTop;

      try { cell.setPointerCapture(e.pointerId); } catch {}
    });

    cell.addEventListener("pointermove", (e) => {
      if (!active || e.pointerId !== pointerId) return;

      const moved =
        Math.abs(e.clientX - startX) > 10 ||
        Math.abs(e.clientY - startY) > 10 ||
        Math.abs(calendarScroll.scrollLeft - startSL) > 10 ||
        Math.abs(calendarScroll.scrollTop - startST) > 10;

      if (moved) cancel();
    });

    cell.addEventListener("pointerup", (e) => {
      if (!active || e.pointerId !== pointerId) return;

      const moved =
        Math.abs(e.clientX - startX) > 10 ||
        Math.abs(e.clientY - startY) > 10 ||
        Math.abs(calendarScroll.scrollLeft - startSL) > 10 ||
        Math.abs(calendarScroll.scrollTop - startST) > 10;

      cancel();

      if (!moved) {
        e.preventDefault();
        e.stopPropagation();
        open();
      }
    });

    cell.addEventListener("pointercancel", cancel);

    // pointer系が効かない環境の保険
    cell.addEventListener("click", (e) => {
      if (calendarScroll.dataset.suppressClick === "1") return;
      e.preventDefault();
      e.stopPropagation();
      open();
    });
  }

  function setupCellTapHandler() {
    // 各セルに setupCalendarCellPress で直接イベントを付けるため、ここでは何もしない
  }

  // ── Mobile scroll guard ───────────────────────────────────────
  function setupMobileScrollGuard() {
    let tracking = false;
    let startX   = 0;
    let startY   = 0;
    let startScrollTop = 0;
    let startedOnLeftColumn = false;

    calendarScroll.addEventListener("touchstart", (e) => {
      if (!e.touches || e.touches.length !== 1) return;
      const t = e.touches[0];
      tracking = true;
      startX = t.clientX;
      startY = t.clientY;
      startScrollTop = calendarScroll.scrollTop;
      startedOnLeftColumn = !!e.target.closest(".left-cell, .corner");
    }, { passive: true });

    calendarScroll.addEventListener("touchmove", (e) => {
      if (!tracking || !e.touches || e.touches.length !== 1) return;
      const t = e.touches[0];
      const dx = t.clientX - startX;
      const dy = t.clientY - startY;
      if (startedOnLeftColumn) return;
      if (Math.abs(dy) > Math.abs(dx) || Math.abs(dy) > 3) {
        calendarScroll.scrollTop = startScrollTop;
      }
      if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 6) {
        e.preventDefault();
      }
    }, { passive: false });

    calendarScroll.addEventListener("touchend",   () => { tracking = false; }, { passive: true });
    calendarScroll.addEventListener("touchcancel", () => { tracking = false; }, { passive: true });
    calendarScroll.addEventListener("scroll", () => {
      if (tracking && !startedOnLeftColumn) calendarScroll.scrollTop = startScrollTop;
    }, { passive: true });
  }

  // ── Drag scroll (mouse) ───────────────────────────────────────
  function setupCalendarDragScroll() {
    let isDown  = false;
    let startX  = 0;
    let startY  = 0;
    let startScrollLeft = 0;
    let startScrollTop  = 0;
    let moved   = false;
    let activePointerId  = null;
    let startOnLeftColumn = false;
    let lastX   = 0;
    let lastT   = 0;
    let velocity = 0;
    let rafId   = null;

    function cancelMomentum() {
      if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; }
    }
    function startMomentum(v) {
      cancelMomentum();
      velocity = v;
      function step() {
        if (Math.abs(velocity) < 0.04) { velocity = 0; return; }
        calendarScroll.scrollLeft += velocity * 16;
        velocity *= 0.88;
        rafId = requestAnimationFrame(step);
      }
      rafId = requestAnimationFrame(step);
    }

    calendarScroll.addEventListener("dragstart",   (e) => e.preventDefault());
    calendarScroll.addEventListener("selectstart", (e) => { if (isDown) e.preventDefault(); });

    calendarScroll.addEventListener("pointerdown", (e) => {
      if (e.pointerType !== "mouse") return;
      if (e.target.closest("button, input, select, textarea")) return;
      if (e.pointerType === "mouse" && e.button !== 0) return;
      cancelMomentum();
      isDown = true;
      moved  = false;
      activePointerId  = e.pointerId;
      startX = lastX   = e.clientX;
      startY = e.clientY;
      lastT  = e.timeStamp;
      startScrollLeft  = calendarScroll.scrollLeft;
      startScrollTop   = calendarScroll.scrollTop;
      startOnLeftColumn = !!e.target.closest(".left-cell, .corner");
      velocity = 0;
      calendarScroll.dataset.downDate   = e.target.closest(".cal-cell")?.dataset.date   || "";
      calendarScroll.dataset.downItemId = e.target.closest(".cal-cell")?.dataset.itemId || "";
      calendarScroll.classList.add("dragging");
      try { calendarScroll.setPointerCapture(e.pointerId); } catch {}
    });

    calendarScroll.addEventListener("pointermove", (e) => {
      if (!isDown || e.pointerId !== activePointerId) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      if (Math.abs(dx) > 5 || Math.abs(dy) > 5) moved = true;
      if (moved) {
        const dt = e.timeStamp - lastT || 1;
        velocity = -(e.clientX - lastX) / dt;
        lastX    = e.clientX;
        lastT    = e.timeStamp;
        calendarScroll.scrollLeft = startScrollLeft - dx;
        if (startOnLeftColumn) calendarScroll.scrollTop = startScrollTop - dy;
        e.preventDefault();
      }
    }, { passive: false });

    calendarScroll.addEventListener("pointerup", (e) => {
      if (!isDown || e.pointerId !== activePointerId) return;
      const wasMoved = moved;
      isDown = false; moved = false; activePointerId = null; startOnLeftColumn = false;
      calendarScroll.classList.remove("dragging");
      try { calendarScroll.releasePointerCapture(e.pointerId); } catch {}
      if (wasMoved) {
        calendarScroll.dataset.suppressClick = "1";
        setTimeout(() => { delete calendarScroll.dataset.suppressClick; }, 250);
        startMomentum(velocity);
      } else {
        const dateStr = calendarScroll.dataset.downDate;
        const itemId  = calendarScroll.dataset.downItemId;
        delete calendarScroll.dataset.downDate;
        delete calendarScroll.dataset.downItemId;
        if (dateStr && itemId) {
          const item = state.items.find(x => x.id === itemId);
          if (item?.type === "activity") editActivityTime(dateStr);
          else openEventSheet(dateStr, itemId);
        }
      }
    });

    calendarScroll.addEventListener("click", (e) => {
      if (calendarScroll.dataset.suppressClick === "1") {
        e.preventDefault(); e.stopPropagation();
        delete calendarScroll.dataset.suppressClick;
      }
    }, true);

    calendarScroll.addEventListener("pointercancel", () => {
      isDown = false; moved = false; activePointerId = null; startOnLeftColumn = false;
      calendarScroll.classList.remove("dragging");
      delete calendarScroll.dataset.downDate;
      delete calendarScroll.dataset.downItemId;
      cancelMomentum();
    });

    calendarScroll.addEventListener("wheel", (e) => {
      if (!!e.target.closest(".left-cell, .corner")) return;
      if (Math.abs(e.deltaY) > Math.abs(e.deltaX) && !e.shiftKey) {
        calendarScroll.scrollLeft += e.deltaY;
        e.preventDefault();
      }
    }, { passive: false });
  }

  function parseLocalDate(dateStr) {
    const m = String(dateStr || "").match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (!m) return null;
    return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
  }

  function startOfDay(date) {
    return new Date(date.getFullYear(), date.getMonth(), date.getDate());
  }

  // ── Utilities ────────────────────────────────────────────────
  function scrollToDate(dateStr) {
    const target = calendarGrid.querySelector(`.date-head[data-date="${dateStr}"]`);
    if (!target) return;
    calendarScroll.scrollLeft = Math.max(0, target.offsetLeft - parseInt(getComputedStyle(document.documentElement).getPropertyValue("--leftw")));
    requestAnimationFrame(updateStayTextPositions);
  }

  function exportBackup() {
    const data = { app: "Cleaning Calendar Grid", version: 1, exportedAt: new Date().toISOString(), state };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `cleaning_calendar_backup_${toDateString(new Date())}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  async function importBackup(e) {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      const imported = data.state || data;
      if (!imported || !Array.isArray(imported.items)) throw new Error("invalid");
      if (!confirm("現在のデータをバックアップ内容で置き換えますか？")) return;
      state = {
        items: imported.items,
        events: imported.events || {},
        activityTimes: imported.activityTimes || {},
        activityContents: Array.isArray(imported.activityContents) ? imported.activityContents : DEFAULT_ACTIVITY_CONTENTS.slice(),
        activityStaffs: Array.isArray(imported.activityStaffs) ? imported.activityStaffs : DEFAULT_ACTIVITY_STAFFS.slice()
      };
      saveState();

      current = new Date();
      renderCalendar(false);
      requestAnimationFrame(() => scrollToDate(toDateString(new Date())));

      alert("復元しました。");
    } catch {
      alert("復元に失敗しました。JSONファイルを確認してください。");
    } finally { e.target.value = ""; }
  }

  function toDateString(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, "0");
    const d = String(date.getDate()).padStart(2, "0");
    return `${y}-${m}-${d}`;
  }

  function isToday(date) { return toDateString(date) === toDateString(new Date()); }

  function makeId(prefix = "id") {
    if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
    return `${prefix}_${Date.now()}_${Math.random().toString(16).slice(2)}`;
  }

  function formatUserName(name) {
    const n = String(name || "").trim();
    if (!n) return "";
    return n.endsWith("様") ? n : n + "様";
  }

  function removeSama(name) { return String(name || "").replace(/様$/, ""); }

  function escapeHtml(str) {
    return String(str ?? "").replace(/[&<>"']/g, s => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    }[s]));
  }

  function escapeAttr(str) { return escapeHtml(str).replace(/`/g, "&#096;"); }

  calendarScroll.addEventListener("scroll", () => {
    requestAnimationFrame(updateStayTextPositions);
  }, { passive: true });

  // ── Boot ─────────────────────────────────────────────────────
  setupActivityTimePickers();
  setupCellTapHandler();
  setupMobileScrollGuard();
  setupCalendarDragScroll();
  renderCalendar(true);
  setTimeout(() => scrollToDate(toDateString(new Date())), 80);
</script>
